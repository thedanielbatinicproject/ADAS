services:
  adas:
    build: .
    volumes:
      - .:/app
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    working_dir: /app
    environment:
      - PYTHONPATH=/app/src
      - DISPLAY=host.docker.internal:0.0
      - QT_QPA_PLATFORM=xcb
      - QT_X11_NO_MITSHM=1
      - PULSE_SERVER=tcp:host.docker.internal:4713
    ports:
      - "8888:8888"
    command: sleep infinity
    cpus: "4"
    mem_limit: "8g"